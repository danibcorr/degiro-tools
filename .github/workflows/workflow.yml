name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  SRC_PROJECT_FOLDER: "degiro_tools"
  TEST_PATH: "tests"
  SRC_PYTHON_VERSION: "3.11"

jobs:
  setup-lint-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Python Environment
        uses: ./.github/actions/setup-python-env
        with:
          src-python-version: ${{ env.SRC_PYTHON_VERSION }}
          uv-group: "pipeline"
          uv-extra: "--all-extras"

      - name: Lint Code
        uses: ./.github/actions/lint-code
        with:
          src-project-folder: ${{ env.SRC_PROJECT_FOLDER }}

      - name: Run Tests
        uses: ./.github/actions/test-code
        with:
          src-project-folder: ${{ env.SRC_PROJECT_FOLDER }}
          src-tests-folder: ${{ env.TEST_PATH }}

  create-release:
    if: github.ref == 'refs/heads/main'
    name: Create Release
    runs-on: ubuntu-latest
    needs: setup-lint-test
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      created: ${{ steps.release.outputs.created }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Python Environment
        uses: ./.github/actions/setup-python-env
        with:
          src-python-version: ${{ env.SRC_PYTHON_VERSION }}
          uv-group: "pipeline"

      - name: Get Version
        id: version
        uses: ./.github/actions/obtain-version

      - name: Create Release
        id: release
        uses: ./.github/actions/create-release
        with:
          version: ${{ steps.version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    if: needs.create-release.outputs.created == 'true'
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: degiro-tools-linux
          - os: windows-latest
            artifact: degiro-tools-windows.exe

    steps:
      - uses: actions/checkout@v7

      - name: Setup Python Environment
        uses: ./.github/actions/setup-python-env
        with:
          src-python-version: ${{ env.SRC_PYTHON_VERSION }}

      - name: Install PyInstaller
        shell: bash
        run: uv pip install pyinstaller

      - name: Build binary
        shell: bash
        run: uv run pyinstaller --onefile --name ${{ matrix.artifact }} --clean degiro_tools/__main__.py

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: dist/${{ matrix.artifact }}
